<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书评论区智能分析</title>
    <style>
        :root {
            --bg: #fff7fb;
            --bg-soft: #fff0f6;
            --panel: rgba(255, 255, 255, 0.78);
            --panel-strong: rgba(255, 255, 255, 0.92);
            --text: #2d1f35;
            --muted: #7a6b86;
            --line: rgba(235, 209, 226, 0.9);
            --brand-1: #ff4d8d;
            --brand-2: #ff7a59;
            --brand-3: #8b5cf6;
            --green-1: #3dd598;
            --green-2: #80ed99;
            --red-1: #ff5a7a;
            --red-2: #ff8a9b;
            --amber-1: #ffb648;
            --amber-2: #ffd166;
            --shadow-xl: 0 24px 60px rgba(255, 108, 146, 0.16);
            --shadow-lg: 0 18px 40px rgba(122, 68, 167, 0.12);
            --shadow-md: 0 10px 24px rgba(80, 41, 107, 0.08);
            --radius-xl: 28px;
            --radius-lg: 22px;
            --radius-md: 18px;
            --radius-sm: 14px;
            --ease: cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 20%, rgba(255, 173, 212, 0.45), transparent 22%),
                radial-gradient(circle at 85% 10%, rgba(188, 165, 255, 0.3), transparent 18%),
                radial-gradient(circle at 90% 85%, rgba(255, 197, 143, 0.25), transparent 20%),
                linear-gradient(180deg, #fff9fc 0%, #fff4f8 45%, #fffdfc 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            border-radius: 999px;
            filter: blur(18px);
            opacity: 0.55;
            z-index: 0;
            pointer-events: none;
            animation: floatBlob 14s ease-in-out infinite;
        }

        body::before {
            width: 240px;
            height: 240px;
            top: 90px;
            right: -60px;
            background: rgba(255, 108, 146, 0.22);
        }

        body::after {
            width: 210px;
            height: 210px;
            left: -40px;
            bottom: 60px;
            background: rgba(139, 92, 246, 0.14);
            animation-delay: -5s;
        }

        @keyframes floatBlob {
            0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
            50% { transform: translate3d(0, -14px, 0) scale(1.05); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1240px;
            margin: 0 auto;
            padding: 28px 20px 40px;
        }

        .panel {
            background: var(--panel);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.65);
            box-shadow: var(--shadow-lg);
        }

        header {
            position: relative;
            overflow: hidden;
            padding: 42px 34px;
            margin-bottom: 24px;
            border-radius: 32px;
            color: #fff;
            background:
                radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.28), transparent 22%),
                radial-gradient(circle at 80% 28%, rgba(255, 255, 255, 0.16), transparent 18%),
                linear-gradient(135deg, #ff4d8d 0%, #ff7a59 52%, #8b5cf6 100%);
            box-shadow: var(--shadow-xl);
            isolation: isolate;
        }

        header::before,
        header::after {
            content: "";
            position: absolute;
            inset: auto;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.14);
            z-index: -1;
        }

        header::before {
            width: 220px;
            height: 220px;
            right: -60px;
            top: -80px;
        }

        header::after {
            width: 160px;
            height: 160px;
            left: -50px;
            bottom: -70px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            margin-bottom: 16px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.02em;
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.26);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }

        header h1 {
            font-size: 34px;
            line-height: 1.15;
            margin-bottom: 10px;
            letter-spacing: -0.03em;
        }

        .hero-subtitle {
            font-size: 16px;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.9);
        }

        .search-section,
        .summary-section,
        .comments-section {
            position: relative;
            border-radius: var(--radius-xl);
            margin-bottom: 22px;
            padding: 24px;
        }

        .search-section {
            overflow: hidden;
        }

        .section-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }

        .section-subtitle {
            font-size: 13px;
            color: var(--muted);
        }

        .search-box {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 6px;
        }

        .search-box input {
            flex: 1 1 280px;
            min-width: 0;
            height: 56px;
            padding: 0 22px;
            border: 1.5px solid rgba(233, 213, 225, 0.95);
            border-radius: 20px;
            font-size: 16px;
            color: var(--text);
            outline: none;
            background: rgba(255, 255, 255, 0.82);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
            transition: border-color 0.25s var(--ease), box-shadow 0.25s var(--ease), transform 0.25s var(--ease);
        }

        .search-box input:focus {
            border-color: rgba(255, 92, 145, 0.65);
            box-shadow: 0 0 0 5px rgba(255, 92, 145, 0.1);
            transform: translateY(-1px);
        }

        .action-btn,
        .back-btn {
            position: relative;
            overflow: hidden;
            height: 56px;
            padding: 0 22px;
            border: none;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease), filter 0.25s var(--ease);
            white-space: nowrap;
        }

        .action-btn::before,
        .back-btn::before {
            content: "";
            position: absolute;
            inset: 0;
            transform: translateX(-120%);
            background: linear-gradient(120deg, transparent 20%, rgba(255, 255, 255, 0.34) 50%, transparent 80%);
            transition: transform 0.55s var(--ease);
        }

        .action-btn:hover::before,
        .back-btn:hover::before {
            transform: translateX(120%);
        }

        .action-btn:hover,
        .back-btn:hover {
            transform: translateY(-2px) scale(1.01);
        }

        .action-btn:active,
        .back-btn:active {
            transform: translateY(0) scale(0.985);
        }

        .btn-search {
            color: #fff;
            background: linear-gradient(135deg, #ff4d8d 0%, #ff7a59 100%);
            box-shadow: 0 12px 24px rgba(255, 91, 146, 0.24);
        }

        .btn-import {
            color: #fff;
            background: linear-gradient(135deg, #22c55e 0%, #34d399 100%);
            box-shadow: 0 12px 24px rgba(52, 211, 153, 0.22);
        }

        .btn-clear {
            color: #fff;
            background: linear-gradient(135deg, #667085 0%, #98a2b3 100%);
            box-shadow: 0 12px 24px rgba(102, 112, 133, 0.18);
        }

        .summary-title,
        .comments-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 21px;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text);
            margin-bottom: 18px;
        }

        .summary-meta {
            margin-bottom: 16px;
            color: var(--muted);
            font-size: 13px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 14px;
            margin-bottom: 18px;
        }

        .stat-card {
            position: relative;
            overflow: hidden;
            padding: 22px 16px;
            border-radius: 22px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: var(--shadow-md);
            transition: transform 0.28s var(--ease), box-shadow 0.28s var(--ease), border-color 0.28s var(--ease);
            background: linear-gradient(180deg, rgba(255, 244, 248, 0.95) 0%, rgba(255, 236, 242, 0.95) 100%);
        }

        .stat-card::after {
            content: "";
            position: absolute;
            inset: auto -10% -40% auto;
            width: 90px;
            height: 90px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.3);
            filter: blur(4px);
        }

        .stat-card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 20px 36px rgba(132, 64, 152, 0.14);
        }

        .stat-card.active {
            border-color: rgba(255, 83, 143, 0.7);
            box-shadow: 0 0 0 4px rgba(255, 83, 143, 0.12), 0 20px 36px rgba(132, 64, 152, 0.14);
        }

        .stat-card.positive {
            background: linear-gradient(180deg, rgba(236, 255, 245, 0.98) 0%, rgba(217, 250, 228, 0.98) 100%);
        }

        .stat-card.negative {
            background: linear-gradient(180deg, rgba(255, 241, 244, 0.98) 0%, rgba(255, 220, 226, 0.98) 100%);
        }

        .stat-card.neutral {
            background: linear-gradient(180deg, rgba(255, 248, 233, 0.98) 0%, rgba(255, 238, 204, 0.98) 100%);
        }

        .stat-value {
            font-size: 34px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 8px;
            letter-spacing: -0.04em;
        }

        .stat-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
        }

        .keywords {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .keywords strong {
            font-size: 14px;
            color: var(--muted);
            margin-right: 4px;
        }

        .keyword-tag {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(255, 77, 141, 0.95) 0%, rgba(139, 92, 246, 0.95) 100%);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.01em;
            box-shadow: 0 10px 22px rgba(181, 83, 184, 0.18);
            transition: transform 0.22s var(--ease), box-shadow 0.22s var(--ease);
        }

        .keyword-tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 24px rgba(181, 83, 184, 0.22);
        }

        .comments-section {
            min-height: 240px;
        }

        #commentsList {
            display: grid;
            gap: 14px;
        }

        .comment {
            display: flex;
            gap: 16px;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: var(--panel-strong);
            box-shadow: 0 8px 22px rgba(116, 70, 139, 0.06);
            transition: transform 0.28s var(--ease), box-shadow 0.28s var(--ease), border-color 0.28s var(--ease), background 0.28s var(--ease);
            animation: cardReveal 0.5s var(--ease) both;
        }

        .comment:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 168, 204, 0.95);
            box-shadow: 0 18px 30px rgba(120, 64, 138, 0.1);
            background: rgba(255, 255, 255, 0.96);
        }

        .comment.highlight {
            animation: pulseHighlight 1.25s var(--ease);
            border-color: rgba(255, 171, 82, 0.75);
        }

        @keyframes pulseHighlight {
            0% { transform: scale(1); background: rgba(255, 249, 221, 0.92); }
            40% { transform: scale(1.01); background: rgba(255, 241, 184, 0.96); }
            100% { transform: scale(1); background: var(--panel-strong); }
        }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 54px;
            height: 54px;
            border-radius: 18px;
            flex-shrink: 0;
            box-shadow: 0 10px 18px rgba(140, 77, 158, 0.14);
        }

        .comment-content {
            flex: 1;
            min-width: 0;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .comment-body {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .username {
            font-size: 15px;
            font-weight: 800;
            color: var(--text);
        }

        .time {
            flex-shrink: 0;
            color: var(--muted);
            font-size: 13px;
        }

        .comment-text {
            color: #584a64;
            line-height: 1.8;
            font-size: 15px;
            margin-bottom: 12px;
            word-break: break-word;
        }

        .likes {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
            padding: 0 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
        }

        .likes {
            color: #ff4d8d;
            background: rgba(255, 77, 141, 0.09);
        }

        .search-results {
            margin-top: 12px;
            padding: 16px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(255, 245, 221, 0.92) 0%, rgba(255, 237, 207, 0.95) 100%);
            border: 1px solid rgba(255, 216, 140, 0.82);
            box-shadow: 0 12px 24px rgba(255, 192, 81, 0.12);
            animation: cardReveal 0.45s var(--ease);
        }

        .search-results h3 {
            color: #8a5a00;
            font-size: 15px;
            font-weight: 700;
        }

        .no-results {
            text-align: center;
            padding: 34px 18px;
            color: var(--muted);
            font-size: 15px;
        }

        .back-btn {
            height: 40px;
            margin-bottom: 12px;
            padding: 0 16px;
            background: rgba(255, 255, 255, 0.85);
            color: var(--text);
            box-shadow: 0 8px 16px rgba(154, 101, 57, 0.08);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(61, 34, 74, 0.42);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .modal-card {
            width: min(680px, 100%);
            max-height: 82vh;
            overflow-y: auto;
            padding: 28px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 30px 60px rgba(72, 32, 87, 0.22);
            border: 1px solid rgba(255, 255, 255, 0.8);
            animation: modalIn 0.28s var(--ease);
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 10px;
        }

        .modal-desc,
        .modal-example {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.7;
        }

        .modal-desc {
            margin-bottom: 6px;
        }

        .modal-example {
            margin-bottom: 18px;
        }

        textarea#importTextarea {
            width: 100%;
            height: 200px;
            padding: 16px 18px;
            border: 1.5px solid rgba(233, 213, 225, 0.95);
            border-radius: 18px;
            resize: vertical;
            font-size: 14px;
            color: var(--text);
            background: rgba(255, 255, 255, 0.88);
            outline: none;
            transition: border-color 0.25s var(--ease), box-shadow 0.25s var(--ease);
            margin-bottom: 18px;
        }

        textarea#importTextarea:focus {
            border-color: rgba(255, 92, 145, 0.62);
            box-shadow: 0 0 0 5px rgba(255, 92, 145, 0.09);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .modal-actions .action-btn {
            flex: 1;
        }

        .btn-secondary {
            color: var(--text);
            background: linear-gradient(135deg, #f7f0f8 0%, #eee8f6 100%);
            box-shadow: 0 10px 18px rgba(129, 100, 153, 0.12);
        }

        @media (max-width: 900px) {
            .container {
                padding: 20px 14px 28px;
            }

            header {
                padding: 32px 22px;
            }

            header h1 {
                font-size: 28px;
            }
        }

        @media (max-width: 720px) {
            .search-box {
                flex-direction: column;
            }

            .action-btn,
            .back-btn,
            .search-box input {
                width: 100%;
            }

            .comment {
                flex-direction: column;
            }

            .comment-header {
                flex-direction: row;
                align-items: center;
            }

            .comment-body {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .modal-card {
                padding: 22px;
            }

            .modal-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="hero-badge">评论洞察实验室 · AI Summary Search</div>
            <h1>💬 小红书评论区智能分析</h1>
            <p class="hero-subtitle">把密集评论区变成轻盈、好读、可检索的内容面板，让总结、筛选和跳转都更顺手。</p>
        </header>

        <div class="search-section panel">
            <div class="section-heading">
                <div>
                    <div class="section-title">✨ 智能检索工作台</div>
                    <div class="section-subtitle">输入关键词，快速定位重点观点、情绪和具体评论。</div>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索关键词，如：敏感肌、价格、效果...">
                <button class="action-btn btn-search" onclick="searchComments()">🔍 搜索</button>
                <button class="action-btn btn-import" onclick="toggleImportModal()">📝 导入评论</button>
                <button class="action-btn btn-clear" onclick="clearComments()">🗑️ 清空</button>
            </div>
            <div id="searchResults"></div>
        </div>

        <!-- 导入评论弹窗 -->
        <div id="importModal" class="modal">
            <div class="modal-card">
                <h2 class="modal-title">📝 导入评论数据</h2>
                <p class="modal-desc">从小红书复制评论，每行一条，格式为“用户名 | 评论内容 | 点赞数”。</p>
                <p class="modal-example">示例：小明|这个产品真好用！|234</p>
                <textarea id="importTextarea" placeholder="粘贴评论数据..."></textarea>
                <div class="modal-actions">
                    <button class="action-btn btn-search" onclick="importComments()">确认导入</button>
                    <button class="action-btn btn-secondary" onclick="toggleImportModal()">取消</button>
                </div>
            </div>
        </div>

        <div class="summary-section panel" id="summarySection">
            <div class="summary-title">📊 评论综合分析</div>
            <div class="summary-meta">点击统计卡片可以切换不同情绪视角，顶部数字始终保持全量统计。</div>
            <div class="stats-grid" id="statsGrid"></div>
            <div class="keywords">
                <strong>热门关键词：</strong>
                <span id="keywords"></span>
            </div>
        </div>

        <div class="comments-section panel" id="commentsSection">
            <div class="comments-title">💬 全部评论</div>
            <div id="commentsList"></div>
        </div>
    </div>

    <script>
        let allComments = [];
        let currentSummary = null;

        // 页面加载时获取评论
        window.onload = function() {
            fetchComments();
        };

        function fetchComments() {
            fetch('/api/comments')
                .then(response => response.json())
                .then(data => {
                    allComments = data.comments;
                    currentSummary = data.summary;
                    renderSummary('all');
                    renderComments(data.comments);
                })
                .catch(error => console.error('Error:', error));
        }

        function renderSummary(activeFilter = null) {
            const summary = currentSummary;
            const statsGrid = document.getElementById('statsGrid');
            const keywordsSpan = document.getElementById('keywords');

            if (!summary) {
                statsGrid.innerHTML = '';
                keywordsSpan.innerHTML = '';
                return;
            }

            statsGrid.innerHTML = `
                <div class="stat-card ${activeFilter === 'all' ? 'active' : ''}" onclick="filterBySentiment('all')">
                    <div class="stat-value">${summary.total_comments}</div>
                    <div class="stat-label">总评论数</div>
                </div>
                <div class="stat-card positive ${activeFilter === 'positive' ? 'active' : ''}" onclick="filterBySentiment('positive')">
                    <div class="stat-value">${summary.positive}</div>
                    <div class="stat-label">正面评价</div>
                </div>
                <div class="stat-card negative ${activeFilter === 'negative' ? 'active' : ''}" onclick="filterBySentiment('negative')">
                    <div class="stat-value">${summary.negative}</div>
                    <div class="stat-label">负面评价</div>
                </div>
                <div class="stat-card neutral ${activeFilter === 'neutral' ? 'active' : ''}" onclick="filterBySentiment('neutral')">
                    <div class="stat-value">${summary.neutral}</div>
                    <div class="stat-label">中性评价</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${summary.positive_rate}%</div>
                    <div class="stat-label">好评率</div>
                </div>
            `;

            keywordsSpan.innerHTML = summary.top_keywords.map(kw => 
                `<span class="keyword-tag">${kw[0]} (${kw[1]})</span>`
            ).join('');
        }

        function renderComments(comments) {
            const commentsList = document.getElementById('commentsList');
            if (!comments.length) {
                commentsList.innerHTML = `<div class="no-results">暂时没有可展示的评论内容</div>`;
                return;
            }

            commentsList.innerHTML = comments.map((comment, index) => `
                <div class="comment" id="comment-${comment.id}" style="animation-delay: ${index * 0.04}s">
                    <img src="${comment.avatar}" class="avatar" alt="${comment.username}">
                    <div class="comment-content">
                        <div class="comment-header">
                            <span class="username">${comment.username}</span>
                            <span class="time">${comment.time}</span>
                        </div>
                        <div class="comment-body">
                            <div class="comment-text">${comment.content}</div>
                            <span class="likes">❤️ ${comment.likes}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function searchComments() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                alert('请输入搜索关键词');
                return;
            }

            fetch(`/api/search?q=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    const searchResults = document.getElementById('searchResults');
                    if (data.success) {
                        searchResults.innerHTML = `
                            <div class="search-results">
                                <button class="back-btn" onclick="resetView()">← 返回全部评论</button>
                                <h3>🔍 搜索结果：找到 ${data.results.length} 条相关评论</h3>
                            </div>
                        `;
                        renderSummary();
                        renderComments(data.results);
                        document.querySelector('.comments-title').textContent = '💬 搜索结果';
                    } else {
                        searchResults.innerHTML = `
                            <div class="search-results">
                                <button class="back-btn" onclick="resetView()">← 返回全部评论</button>
                                <div class="no-results">${data.message}</div>
                            </div>
                        `;
                    }
                })
                .catch(error => console.error('Error:', error));
        }

        function filterBySentiment(type) {
            fetch(`/api/comments/sentiment?type=${type}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        renderSummary(type);
                        renderComments(data.comments);
                        
                        let title = '💬 全部评论';
                        if (type === 'positive') title = '😊 正面评价';
                        else if (type === 'negative') title = '😔 负面评价';
                        else if (type === 'neutral') title = '😐 中性评价';
                        
                        document.querySelector('.comments-title').textContent = title;
                        document.getElementById('searchResults').innerHTML = '';
                        document.getElementById('searchInput').value = '';
                    }
                })
                .catch(error => console.error('Error:', error));
        }

        function resetView() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').innerHTML = '';
            document.querySelector('.comments-title').textContent = '💬 全部评论';
            renderSummary('all');
            renderComments(allComments);
        }

        // 支持回车键搜索
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchComments();
            }
        });

        // 切换导入弹窗
        function toggleImportModal() {
            const modal = document.getElementById('importModal');
            if (modal.style.display === 'flex') {
                modal.style.display = 'none';
            } else {
                modal.style.display = 'flex';
            }
        }

        // 导入评论
        function importComments() {
            const text = document.getElementById('importTextarea').value.trim();
            if (!text) {
                alert('请输入评论数据！');
                return;
            }

            const lines = text.split('\n').filter(line => line.trim());
            const importedComments = [];
            
            lines.forEach((line, index) => {
                const parts = line.split('|');
                if (parts.length >= 2) {
                    importedComments.push({
                        id: Date.now() + index,
                        username: parts[0].trim(),
                        content: parts[1].trim(),
                        likes: parts[2] ? parseInt(parts[2].trim()) || 0 : Math.floor(Math.random() * 100),
                        time: '刚刚',
                        avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${Date.now() + index}`
                    });
                }
            });

            if (importedComments.length === 0) {
                alert('未能解析有效的评论数据，请检查格式！');
                return;
            }

            fetch('/api/import', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ comments: importedComments })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert(`成功导入 ${importedComments.length} 条评论！`);
                    toggleImportModal();
                    document.getElementById('importTextarea').value = '';
                    resetView();
                    fetchComments();
                } else {
                    alert('导入失败：' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('导入失败，请稍后重试！');
            });
        }

        // 清空评论
        function clearComments() {
            if (!confirm('确定要清空并恢复为示例数据吗？')) {
                return;
            }
            
            fetch('/api/clear', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('已恢复示例数据！');
                    resetView();
                    fetchComments();
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('操作失败，请稍后重试！');
            });
        }

        // 点击弹窗外部关闭
        document.getElementById('importModal').addEventListener('click', function(e) {
            if (e.target === this) {
                toggleImportModal();
            }
        });
    </script>
</body>
</html>
